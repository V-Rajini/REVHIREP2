<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<!-- ============================================================
     RevHire | reset-password.html — Clean Redesign
     ============================================================
     ✅ ALL Thymeleaf attributes preserved EXACTLY:
       • th:href="@{/}"
       • th:if="${successMessage}" / th:text="${successMessage}"
       • th:if="${errorMessage}"   / th:text="${errorMessage}"
       • th:action="@{/reset-password}" th:object="${resetDto}"
       • th:field="*{email}"  (hidden)
       • th:value="${securityQuestion}" (readonly)
       • th:field="*{securityAnswer}"
       • th:field="*{newPassword}"
       • th:href="@{/login}"
     ============================================================ -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password | RevHire</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      margin: 0;
    }

    /* ── Brand ── */
    .rh-brand {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; margin-bottom: 24px;
    }
    .rh-brand-icon {
      width: 36px; height: 36px;
      background: #2557a7; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; color: #fff;
      box-shadow: 0 3px 10px rgba(37,87,167,0.30);
    }
    .rh-brand-name {
      font-size: 20px; font-weight: 700;
      color: #111827; letter-spacing: -0.3px;
    }

    /* ── Card ── */
    .rh-card {
      background: #fff;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      padding: 36px 36px 32px;
      width: 100%;
      max-width: 440px;
    }

    /* ── Icon circle ── */
    .rh-icon-circle {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: #eff6ff;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: #2557a7;
      margin: 0 auto 20px;
    }

    .rh-card-title {
      font-size: 22px; font-weight: 700;
      color: #111827; margin: 0 0 6px;
      letter-spacing: -0.3px; text-align: center;
    }
    .rh-card-sub {
      font-size: 14px; color: #6b7280;
      margin: 0 0 28px; text-align: center;
      line-height: 1.55;
    }

    /* ── Section label ── */
    .rh-section-label {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: #9ca3af; margin-bottom: 14px;
    }

    /* ── Security question box ── */
    .rh-question-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 9px;
      padding: 12px 14px;
      font-size: 14px;
      color: #374151;
      font-weight: 500;
      margin-bottom: 18px;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .rh-question-box i { color: #2557a7; font-size: 16px; margin-top: 1px; flex-shrink: 0; }

    /* ── Label ── */
    .rh-label {
      font-size: 13px; font-weight: 600;
      color: #374151; margin-bottom: 7px;
      display: block;
    }

    /* ── Input ── */
    .rh-input-wrap { position: relative; margin-bottom: 6px; }

    .rh-input-icon {
      position: absolute; top: 50%; left: 14px;
      transform: translateY(-50%);
      color: #9ca3af; font-size: 15px;
      pointer-events: none;
    }

    .rh-input {
      width: 100%; height: 44px;
      padding: 0 14px 0 40px;
      border: 1px solid #e5e7eb;
      border-radius: 9px;
      font-size: 14px; font-family: inherit;
      color: #111827; background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    .rh-input:focus {
      border-color: #2557a7;
      box-shadow: 0 0 0 3px rgba(37,87,167,0.10);
    }
    .rh-input::placeholder  { color: #9ca3af; }
    .rh-input-password      { padding-right: 44px; }

    .rh-toggle-btn {
      position: absolute; top: 50%; right: 12px;
      transform: translateY(-50%);
      background: none; border: none;
      color: #9ca3af; font-size: 16px;
      cursor: pointer; padding: 2px 4px;
      transition: color 0.15s;
    }
    .rh-toggle-btn:hover { color: #374151; }

    .rh-field-group { margin-bottom: 18px; }

    .rh-hint {
      font-size: 12px; color: #9ca3af;
      margin-top: 5px; display: block;
    }

    /* ── Divider ── */
    .rh-divider { height: 1px; background: #f3f4f6; margin: 20px 0; }

    /* ── Submit ── */
    .rh-submit {
      width: 100%; height: 46px;
      background: #2557a7; color: #fff;
      border: none; border-radius: 9px;
      font-size: 15px; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 16px;
    }
    .rh-submit:hover  { background: #1a4480; }
    .rh-submit:active { transform: scale(0.98); }

    /* ── Alerts ── */
    .rh-alert {
      border-radius: 9px; padding: 11px 14px;
      font-size: 13.5px; font-weight: 500;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 9px;
    }
    .rh-alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .rh-alert-danger  { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

    /* ── Back / links ── */
    .rh-back {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 13px; font-weight: 500;
      color: #6b7280; text-decoration: none;
      margin-bottom: 24px; transition: color 0.15s;
    }
    .rh-back:hover { color: #2557a7; }

    .rh-link-row {
      text-align: center; font-size: 13.5px; color: #6b7280;
    }
    .rh-link-row a {
      font-weight: 600; color: #2557a7; text-decoration: none;
    }
    .rh-link-row a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .rh-card { padding: 28px 20px; }
    }
  </style>
</head>

<body>

  <!-- Brand — BACKEND SAFE: th:href="@{/}" preserved -->
  <a class="rh-brand" th:href="@{/}">
    <div class="rh-brand-icon">R</div>
    <span class="rh-brand-name">RevHire</span>
  </a>

  <div class="rh-card">

    <!-- Back — BACKEND SAFE: th:href="@{/}" preserved -->
    <a class="rh-back" th:href="@{/}">
      <i class="bi bi-arrow-left"></i> Back to Home
    </a>

    <!-- Icon + Title -->
    <div class="rh-icon-circle">
      <i class="bi bi-key-fill"></i>
    </div>
    <h1 class="rh-card-title">Reset your password</h1>
    <p class="rh-card-sub">Answer your security question to set a new password.</p>

    <!-- Success alert — BACKEND SAFE: th:if="${successMessage}" / th:text="${successMessage}" preserved -->
    <div th:if="${successMessage}" class="rh-alert rh-alert-success">
      <i class="bi bi-check-circle-fill"></i>
      <span th:text="${successMessage}"></span>
    </div>

    <!-- Error alert — BACKEND SAFE: th:if="${errorMessage}" / th:text="${errorMessage}" preserved -->
    <div th:if="${errorMessage}" class="rh-alert rh-alert-danger">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span th:text="${errorMessage}"></span>
    </div>

    <!-- FORM — BACKEND SAFE: th:action="@{/reset-password}" th:object="${resetDto}" preserved -->
    <form th:action="@{/reset-password}" th:object="${resetDto}" method="post">

      <!-- Hidden email — BACKEND SAFE: th:field="*{email}" preserved -->
      <input type="hidden" th:field="*{email}">

      <!-- Security Question display — BACKEND SAFE: th:value="${securityQuestion}" preserved -->
      <div class="rh-section-label">Your Security Question</div>
      <div class="rh-question-box">
        <i class="bi bi-shield-check"></i>
        <span th:value="${securityQuestion}" th:text="${securityQuestion}">Security question here</span>
      </div>

      <!-- Security Answer — BACKEND SAFE: th:field="*{securityAnswer}" preserved -->
      <div class="rh-field-group">
        <label class="rh-label" for="answerField">Your Answer</label>
        <div class="rh-input-wrap">
          <i class="bi bi-chat-square-text rh-input-icon"></i>
          <input id="answerField"
                 type="text"
                 th:field="*{securityAnswer}"
                 class="rh-input"
                 placeholder="Enter your answer"
                 required>
        </div>
      </div>

      <div class="rh-divider"></div>

      <!-- New Password — BACKEND SAFE: th:field="*{newPassword}" preserved -->
      <div class="rh-field-group">
        <label class="rh-label" for="newPassword">New Password</label>
        <div class="rh-input-wrap">
          <i class="bi bi-lock rh-input-icon"></i>
          <input id="newPassword"
                 type="password"
                 th:field="*{newPassword}"
                 class="rh-input rh-input-password"
                 placeholder="Enter new password"
                 required
                 pattern="^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$"
                 title="Minimum 8 characters, one uppercase, one number, one special symbol">
          <button type="button" class="rh-toggle-btn" onclick="togglePassword()">
            <i class="bi bi-eye" id="toggleIcon"></i>
          </button>
        </div>
        <span class="rh-hint">8+ characters, uppercase, number &amp; special symbol</span>
      </div>

      <button type="submit" class="rh-submit">Update Password</button>

      <!-- Back to login — BACKEND SAFE: th:href="@{/login}" preserved -->
      <div class="rh-link-row">
        <a th:href="@{/login}"><i class="bi bi-arrow-left"></i> Back to Login</a>
      </div>

    </form>

  </div>

<script>
  function togglePassword() {
    var input = document.getElementById('newPassword');
    var icon  = document.getElementById('toggleIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
  }
</script>

</body>
</html>
