<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<!-- ============================================================
     RevHire | forgot-password.html — Clean Redesign
     ============================================================
     ✅ ALL Thymeleaf attributes preserved EXACTLY:
       • th:href="@{/}"
       • th:if="${errorMessage}" / th:text="${errorMessage}"
       • th:action="@{/forgot-password}" th:object="${forgotDto}"
       • th:field="*{email}"
       • th:if="${#fields.hasErrors('email')}" / th:errors="*{email}"
       • th:href="@{/login}"
     ============================================================ -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Forgot Password | RevHire</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      margin: 0;
    }

    /* ── Brand ── */
    .rh-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      margin-bottom: 24px;
    }
    .rh-brand-icon {
      width: 36px; height: 36px;
      background: #2557a7;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; color: #fff;
      box-shadow: 0 3px 10px rgba(37,87,167,0.30);
    }
    .rh-brand-name {
      font-size: 20px; font-weight: 700;
      color: #111827; letter-spacing: -0.3px;
    }

    /* ── Card ── */
    .rh-card {
      background: #fff;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      padding: 36px 36px 32px;
      width: 100%;
      max-width: 420px;
    }

    /* ── Icon circle ── */
    .rh-icon-circle {
      width: 56px; height: 56px;
      border-radius: 14px;
      background: #eff6ff;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; color: #2557a7;
      margin: 0 auto 20px;
    }

    .rh-card-title {
      font-size: 22px; font-weight: 700;
      color: #111827; margin: 0 0 6px;
      letter-spacing: -0.3px; text-align: center;
    }
    .rh-card-sub {
      font-size: 14px; color: #6b7280;
      margin: 0 0 28px; text-align: center;
      line-height: 1.55;
    }

    /* ── Label ── */
    .rh-label {
      font-size: 13px; font-weight: 600;
      color: #374151; margin-bottom: 7px;
      display: block;
    }

    /* ── Input ── */
    .rh-input-wrap { position: relative; margin-bottom: 6px; }

    .rh-input-icon {
      position: absolute; top: 50%; left: 14px;
      transform: translateY(-50%);
      color: #9ca3af; font-size: 15px;
      pointer-events: none;
    }

    .rh-input {
      width: 100%; height: 44px;
      padding: 0 14px 0 40px;
      border: 1px solid #e5e7eb;
      border-radius: 9px;
      font-size: 14px; font-family: inherit;
      color: #111827; background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    .rh-input:focus {
      border-color: #2557a7;
      box-shadow: 0 0 0 3px rgba(37,87,167,0.10);
    }
    .rh-input::placeholder { color: #9ca3af; }

    .rh-field-group { margin-bottom: 20px; }
    .rh-field-error {
      font-size: 12px; color: #dc2626;
      margin-top: 5px; display: block;
    }

    /* ── Submit ── */
    .rh-submit {
      width: 100%; height: 46px;
      background: #2557a7; color: #fff;
      border: none; border-radius: 9px;
      font-size: 15px; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-bottom: 16px;
    }
    .rh-submit:hover  { background: #1a4480; }
    .rh-submit:active { transform: scale(0.98); }

    /* ── Alert ── */
    .rh-alert-danger {
      border-radius: 9px; padding: 11px 14px;
      font-size: 13.5px; font-weight: 500;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 9px;
      background: #fef2f2; color: #991b1b;
      border: 1px solid #fecaca;
    }

    /* ── Back / links ── */
    .rh-back {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 13px; font-weight: 500;
      color: #6b7280; text-decoration: none;
      margin-bottom: 24px; transition: color 0.15s;
    }
    .rh-back:hover { color: #2557a7; }

    .rh-link-row {
      text-align: center;
      font-size: 13.5px; color: #6b7280;
    }
    .rh-link-row a {
      font-weight: 600; color: #2557a7; text-decoration: none;
    }
    .rh-link-row a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .rh-card { padding: 28px 20px; }
    }
  </style>
</head>

<body>

  <!-- Brand — BACKEND SAFE: th:href="@{/}" preserved -->
  <a class="rh-brand" th:href="@{/}">
    <div class="rh-brand-icon">R</div>
    <span class="rh-brand-name">RevHire</span>
  </a>

  <div class="rh-card">

    <!-- Back — BACKEND SAFE: th:href="@{/}" preserved -->
    <a class="rh-back" th:href="@{/}">
      <i class="bi bi-arrow-left"></i> Back to Home
    </a>

    <!-- Icon + Title -->
    <div class="rh-icon-circle">
      <i class="bi bi-shield-lock"></i>
    </div>
    <h1 class="rh-card-title">Forgot your password?</h1>
    <p class="rh-card-sub">
      Enter your registered email and we'll verify your identity using your security question.
    </p>

    <!-- Error alert — BACKEND SAFE: th:if="${errorMessage}" / th:text="${errorMessage}" preserved -->
    <div th:if="${errorMessage}" class="rh-alert-danger">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span th:text="${errorMessage}"></span>
    </div>

    <!-- FORM — BACKEND SAFE: th:action="@{/forgot-password}" th:object="${forgotDto}" preserved -->
    <form th:action="@{/forgot-password}" th:object="${forgotDto}" method="post">

      <!-- Email — BACKEND SAFE: th:field="*{email}" preserved -->
      <div class="rh-field-group">
        <label class="rh-label" for="emailField">Email Address</label>
        <div class="rh-input-wrap">
          <i class="bi bi-envelope rh-input-icon"></i>
          <input id="emailField"
                 type="email"
                 th:field="*{email}"
                 class="rh-input"
                 placeholder="Enter your registered email"
                 required>
        </div>
        <!-- BACKEND SAFE: th:if="${#fields.hasErrors('email')}" / th:errors="*{email}" preserved -->
        <span class="rh-field-error"
              th:if="${#fields.hasErrors('email')}"
              th:errors="*{email}"></span>
      </div>

      <button type="submit" class="rh-submit">Continue</button>

      <!-- Back to login — BACKEND SAFE: th:href="@{/login}" preserved -->
      <div class="rh-link-row">
        Remembered it? <a th:href="@{/login}">Back to Login</a>
      </div>

    </form>

  </div>

</body>
</html>
