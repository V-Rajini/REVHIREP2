<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Update Profile | RevHire</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--rh-sidebar-bg:#0d1b2a;--rh-sidebar-w:240px;--rh-accent:#2557a7;--rh-accent-light:#eff6ff;--rh-border:#e5e7eb;--rh-gray-bg:#f3f4f6;--rh-text:#111827;--rh-muted:#6b7280;--rh-font:"Inter","Segoe UI",system-ui,sans-serif;--rh-radius:10px;--rh-transition:all .18s ease}
    *,*::before,*::after{box-sizing:border-box}body{font-family:var(--rh-font);font-size:14px;color:var(--rh-text);background:var(--rh-gray-bg);margin:0}
    .rh-sidebar{width:var(--rh-sidebar-w);height:100vh;position:fixed;top:0;left:0;background:var(--rh-sidebar-bg);display:flex;flex-direction:column;z-index:1000;box-shadow:4px 0 24px rgba(0,0,0,.18)}
    .rh-sidebar-brand{display:flex;align-items:center;gap:12px;padding:22px 20px 18px;border-bottom:1px solid rgba(255,255,255,.07);text-decoration:none}
    .rh-brand-icon{width:38px;height:38px;background:var(--rh-accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff;box-shadow:0 4px 12px rgba(37,87,167,.45);flex-shrink:0}
    .rh-brand-name{font-size:17px;font-weight:700;color:#fff;line-height:1}.rh-brand-tagline{font-size:10.5px;color:#8a9bb0;letter-spacing:.4px;margin-top:3px;text-transform:uppercase}
    .rh-sidebar-section-label{font-size:10px;font-weight:600;color:#8a9bb0;text-transform:uppercase;letter-spacing:1.2px;padding:18px 20px 8px}
    .rh-sidebar-nav{flex:1;overflow-y:auto;padding:4px 0 8px;scrollbar-width:none}.rh-sidebar-nav::-webkit-scrollbar{display:none}
    .rh-nav-item{padding:3px 12px}.rh-nav-link{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--rh-radius);color:#c8d6e5;text-decoration:none;font-size:14px;font-weight:500;transition:var(--rh-transition);border-left:3px solid transparent}
    .rh-nav-link:hover{background:rgba(255,255,255,.06);color:#fff;border-left-color:rgba(37,87,167,.5);text-decoration:none}.rh-nav-link.active{background:rgba(37,87,167,.22);color:#fff;border-left-color:var(--rh-accent)}
    .rh-nav-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;opacity:.8}.rh-nav-link:hover .rh-nav-icon,.rh-nav-link.active .rh-nav-icon{opacity:1}.rh-nav-label{flex:1;line-height:1}
    .rh-sidebar-divider{height:1px;background:rgba(255,255,255,.07);margin:10px 16px}.rh-sidebar-footer{padding:14px 12px 18px;border-top:1px solid rgba(255,255,255,.07)}
    .rh-logout-btn{width:100%;display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:var(--rh-radius);background:transparent;border:1px solid rgba(255,255,255,.10);color:#8a9bb0;font-size:14px;font-weight:500;cursor:pointer;transition:var(--rh-transition);text-align:left;font-family:var(--rh-font)}.rh-logout-btn:hover{background:rgba(220,38,38,.12);border-color:rgba(220,38,38,.35);color:#f87171}
    .rh-topbar{position:sticky;top:0;z-index:900;height:62px;background:#fff;border-bottom:1px solid var(--rh-border);display:flex;align-items:center;justify-content:space-between;padding:0 28px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .rh-page-title{font-size:17px;font-weight:650;color:var(--rh-text);letter-spacing:-.2px;margin:0;display:flex;align-items:center;gap:8px}
    .rh-btn-back{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;background:var(--rh-accent-light);color:var(--rh-accent);border:1px solid #bfdbfe;font-size:13px;font-weight:600;text-decoration:none;transition:var(--rh-transition)}.rh-btn-back:hover{background:var(--rh-accent);color:#fff;text-decoration:none}
    .main-wrapper{margin-left:var(--rh-sidebar-w);min-height:100vh;display:flex;flex-direction:column}.main-content{padding:28px 28px 48px;flex:1;display:flex;justify-content:center}
    .rh-form-card{background:#fff;border:1px solid var(--rh-border);border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.06);padding:32px 36px;width:100%;max-width:640px}
    .rh-form-header{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--rh-border)}
    .rh-form-title{font-size:18px;font-weight:700;color:var(--rh-text);margin:0 0 4px}.rh-form-sub{font-size:13px;color:var(--rh-muted);margin:0}
    .rh-label{font-size:13px;font-weight:600;color:#374151;margin-bottom:7px;display:block}
    .rh-input,.rh-select,.rh-textarea{width:100%;padding:10px 14px;border:1px solid var(--rh-border);border-radius:9px;font-size:14px;font-family:var(--rh-font);color:var(--rh-text);background:#fff;outline:none;transition:border-color .15s,box-shadow .15s;appearance:none}
    .rh-input:focus,.rh-select:focus,.rh-textarea:focus{border-color:var(--rh-accent);box-shadow:0 0 0 3px rgba(37,87,167,.10)}
    .rh-textarea{resize:vertical;min-height:100px;line-height:1.6}
    .rh-field-row{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .rh-field-group{margin-bottom:20px}
    .rh-divider{height:1px;background:var(--rh-border);margin:24px 0}
    .rh-form-actions{display:flex;gap:10px;justify-content:flex-end}
    .rh-btn-submit{display:inline-flex;align-items:center;gap:7px;padding:10px 26px;border-radius:9px;background:var(--rh-accent);color:#fff;border:none;font-size:14px;font-weight:600;font-family:var(--rh-font);cursor:pointer;transition:background .15s}.rh-btn-submit:hover{background:#1a4480}
    .rh-btn-cancel{display:inline-flex;align-items:center;gap:7px;padding:10px 22px;border-radius:9px;background:#fff;color:#374151;border:1px solid var(--rh-border);font-size:14px;font-weight:600;text-decoration:none;transition:background .15s}.rh-btn-cancel:hover{background:var(--rh-gray-bg);color:var(--rh-text);text-decoration:none}
    @media(max-width:991.98px){.main-wrapper{margin-left:0}.rh-field-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<aside class="rh-sidebar">
  <a class="rh-sidebar-brand" th:href="@{/jobseeker/dashboard}"><div class="rh-brand-icon">R</div><div><div class="rh-brand-name">RevHire</div><div class="rh-brand-tagline">Job Seeker Portal</div></div></a>
  <nav class="rh-sidebar-nav">
    <div class="rh-sidebar-section-label">Main Menu</div>
    <div class="rh-nav-item"><a class="rh-nav-link" th:href="@{/jobseeker/dashboard}"><span class="rh-nav-icon"><i class="bi bi-speedometer2"></i></span><span class="rh-nav-label">Dashboard</span></a></div>
    <div class="rh-nav-item"><a class="rh-nav-link" th:href="@{/jobs/search}"><span class="rh-nav-icon"><i class="bi bi-search"></i></span><span class="rh-nav-label">Search Jobs</span></a></div>
    <div class="rh-nav-item"><a class="rh-nav-link" th:href="@{/jobseeker/applications}"><span class="rh-nav-icon"><i class="bi bi-briefcase"></i></span><span class="rh-nav-label">My Applications</span></a></div>
    <div class="rh-nav-item"><a class="rh-nav-link" th:href="@{/jobseeker/saved-jobs}"><span class="rh-nav-icon"><i class="bi bi-bookmark"></i></span><span class="rh-nav-label">Saved Jobs</span></a></div>
    <div class="rh-nav-item"><a class="rh-nav-link" th:href="@{/jobseeker/notifications}"><span class="rh-nav-icon"><i class="bi bi-bell"></i></span><span class="rh-nav-label">Notifications</span></a></div>
    <div class="rh-sidebar-divider"></div>
    <div class="rh-sidebar-section-label">My Profile</div>
    <div class="rh-nav-item"><a class="rh-nav-link" th:href="@{/jobseeker/profile}"><span class="rh-nav-icon"><i class="bi bi-person-circle"></i></span><span class="rh-nav-label">View Profile</span></a></div>
    <div class="rh-nav-item"><a class="rh-nav-link active" th:href="@{/jobseeker/update-profile}"><span class="rh-nav-icon"><i class="bi bi-pencil-square"></i></span><span class="rh-nav-label">Update Profile</span></a></div>
    <div class="rh-sidebar-divider"></div>
    <div class="rh-sidebar-section-label">Resume</div>
    <div class="rh-nav-item"><a class="rh-nav-link" th:href="@{/jobseeker/view-text-resume}"><span class="rh-nav-icon"><i class="bi bi-file-text"></i></span><span class="rh-nav-label">View Resume</span></a></div>
    <div class="rh-nav-item"><a class="rh-nav-link" th:href="@{/jobseeker/upload-resume}"><span class="rh-nav-icon"><i class="bi bi-cloud-upload"></i></span><span class="rh-nav-label">Upload PDF Resume</span></a></div>
  </nav>
  <div class="rh-sidebar-footer"><form th:action="@{/logout}" method="post" style="margin:0;"><button type="submit" class="rh-logout-btn"><i class="bi bi-box-arrow-left"></i><span>Logout</span></button></form></div>
</aside>
<div class="main-wrapper">
  <nav class="rh-topbar">
    <h1 class="rh-page-title"><i class="bi bi-pencil-square" style="color:#2557a7;font-size:15px;"></i> Update Profile</h1>
    <a class="rh-btn-back" th:href="@{/jobseeker/dashboard}"><i class="bi bi-grid-1x2"></i> Dashboard</a>
  </nav>
  <main class="main-content">
    <div class="rh-form-card">
      <div class="rh-form-header">
        <h2 class="rh-form-title">Update Your Profile</h2>
        <p class="rh-form-sub">Keep your information current to get better job matches.</p>
      </div>
      <form th:action="@{/jobseeker/update-profile}" th:object="${jobSeeker}" method="post">
        <input type="hidden" th:field="*{id}">
        <div class="rh-field-row">
          <div class="rh-field-group">
            <label class="rh-label">Full Name</label>
            <input type="text" class="rh-input" th:field="*{fullName}" placeholder="Your full name">
          </div>
          <div class="rh-field-group">
            <label class="rh-label">Phone</label>
            <input type="text" class="rh-input" th:field="*{phone}" placeholder="10-digit mobile number">
          </div>
        </div>
        <div class="rh-field-group">
          <label class="rh-label">Location</label>
          <input type="text" class="rh-input" th:field="*{location}" placeholder="City / State">
        </div>
        <div class="rh-field-group">
          <label class="rh-label">Employment Status</label>
          <select class="rh-select" th:field="*{employmentStatus}" required>
            <option value="">Select Status</option>
            <option value="OPEN_TO_WORK">Open to Work</option>
            <option value="SERVING_NOTICE">Serving Notice Period</option>
            <option value="SHORT_NOTICE">Available in Short Notice</option>
            <option value="CURRENTLY_WORKING">Currently Working</option>
            <option value="FRESHER">Fresher</option>
          </select>
        </div>
        <div class="rh-field-group">
          <label class="rh-label">Profile Summary</label>
          <textarea class="rh-textarea" rows="4" th:field="*{profileSummary}" placeholder="Write about your skills and experience..."></textarea>
        </div>
        <div class="rh-divider"></div>
        <div class="rh-form-actions">
          <a class="rh-btn-cancel" th:href="@{/jobseeker/dashboard}"><i class="bi bi-x"></i> Cancel</a>
          <button type="submit" class="rh-btn-submit"><i class="bi bi-check-circle"></i> Update Profile</button>
        </div>
      </form>
    </div>
  </main>
</div>
</body></html>
