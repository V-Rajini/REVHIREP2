<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<!-- ============================================================
     RevHire | login.html  — Clean Redesign
     ============================================================
     ✅ ALL Thymeleaf attributes preserved EXACTLY:
       • th:href="@{/}"
       • th:if="${param.logout}"
       • th:if="${param.error}"
       • th:if="${successMessage}" / th:text="${successMessage}"
       • th:if="${param.registered}"
       • th:action="@{/login}" method="post"
       • name="username" / name="password"
       • th:href="@{/forgot-password}"
       • th:href="@{/register}"
     ============================================================ -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | RevHire</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      margin: 0;
    }

    /* ── Brand bar at top ── */
    .rh-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      margin-bottom: 28px;
    }

    .rh-brand-icon {
      width: 36px; height: 36px;
      background: #2557a7;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; color: #fff;
      box-shadow: 0 3px 10px rgba(37,87,167,0.30);
    }

    .rh-brand-name {
      font-size: 20px; font-weight: 700;
      color: #111827; letter-spacing: -0.3px;
    }

    /* ── Card ── */
    .rh-card {
      background: #fff;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      padding: 36px 36px 32px;
      width: 100%;
      max-width: 420px;
    }

    .rh-card-title {
      font-size: 22px; font-weight: 700;
      color: #111827; margin: 0 0 4px;
      letter-spacing: -0.3px;
    }

    .rh-card-sub {
      font-size: 14px; color: #6b7280;
      margin: 0 0 28px;
    }

    /* ── Form ── */
    .rh-label {
      font-size: 13px; font-weight: 600;
      color: #374151; margin-bottom: 7px;
      display: block;
    }

    .rh-input-wrap {
      position: relative;
      margin-bottom: 18px;
    }

    .rh-input-icon {
      position: absolute;
      top: 50%; left: 14px;
      transform: translateY(-50%);
      color: #9ca3af; font-size: 15px;
      pointer-events: none;
    }

    .rh-input {
      width: 100%;
      height: 44px;
      padding: 0 14px 0 40px;
      border: 1px solid #e5e7eb;
      border-radius: 9px;
      font-size: 14px; font-family: inherit;
      color: #111827;
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    .rh-input:focus {
      border-color: #2557a7;
      box-shadow: 0 0 0 3px rgba(37,87,167,0.10);
    }

    .rh-input::placeholder { color: #9ca3af; }

    /* password field has extra right padding for toggle */
    .rh-input-password { padding-right: 44px; }

    .rh-toggle-btn {
      position: absolute;
      top: 50%; right: 12px;
      transform: translateY(-50%);
      background: none; border: none;
      color: #9ca3af; font-size: 16px;
      cursor: pointer; padding: 2px 4px;
      transition: color 0.15s;
    }

    .rh-toggle-btn:hover { color: #374151; }

    /* ── Forgot link ── */
    .rh-forgot {
      display: block; text-align: right;
      font-size: 12.5px; font-weight: 600;
      color: #2557a7; text-decoration: none;
      margin-top: -10px; margin-bottom: 20px;
    }

    .rh-forgot:hover { text-decoration: underline; color: #1a4480; }

    /* ── Submit ── */
    .rh-submit {
      width: 100%; height: 46px;
      background: #2557a7;
      color: #fff;
      border: none; border-radius: 9px;
      font-size: 15px; font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: 0.1px;
    }

    .rh-submit:hover  { background: #1a4480; }
    .rh-submit:active { transform: scale(0.98); }

    /* ── Divider ── */
    .rh-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 22px 0;
      font-size: 12px; color: #9ca3af;
    }

    .rh-divider::before, .rh-divider::after {
      content: ''; flex: 1;
      height: 1px; background: #e5e7eb;
    }

    /* ── Register link ── */
    .rh-register-row {
      text-align: center;
      font-size: 13.5px; color: #6b7280;
    }

    .rh-register-row a {
      font-weight: 600; color: #2557a7;
      text-decoration: none;
    }

    .rh-register-row a:hover { text-decoration: underline; }

    /* ── Alerts ── */
    .rh-alert {
      border-radius: 9px; padding: 11px 14px;
      font-size: 13.5px; font-weight: 500;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 9px;
    }

    .rh-alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .rh-alert-danger  { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

    /* ── Back link ── */
    .rh-back {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 13px; font-weight: 500;
      color: #6b7280; text-decoration: none;
      margin-bottom: 28px;
      transition: color 0.15s;
    }

    .rh-back:hover { color: #2557a7; }

    @media (max-width: 480px) {
      .rh-card { padding: 28px 20px; }
    }
  </style>
</head>

<body>

  <!-- Brand -->
  <!-- BACKEND SAFE: th:href="@{/}" preserved -->
  <a class="rh-brand" th:href="@{/}">
    <div class="rh-brand-icon">R</div>
    <span class="rh-brand-name">RevHire</span>
  </a>

  <div class="rh-card">

    <!-- Back -->
    <a class="rh-back" th:href="@{/}">
      <i class="bi bi-arrow-left"></i> Back to Home
    </a>

    <!-- Heading -->
    <h1 class="rh-card-title">Welcome back</h1>
    <p class="rh-card-sub">Sign in to your RevHire account</p>

    <!-- BACKEND SAFE: all th:if / th:text alert attributes preserved -->
    <div th:if="${param.logout}" class="rh-alert rh-alert-success">
      <i class="bi bi-check-circle-fill"></i> You've been logged out successfully.
    </div>

    <div th:if="${param.error}" class="rh-alert rh-alert-danger">
      <i class="bi bi-exclamation-circle-fill"></i> Invalid email or password. Please try again.
    </div>

    <div th:if="${successMessage}" class="rh-alert rh-alert-success">
      <i class="bi bi-check-circle-fill"></i>
      <span th:text="${successMessage}"></span>
    </div>

    <div th:if="${param.registered}" class="rh-alert rh-alert-success">
      <i class="bi bi-check-circle-fill"></i> Account created! Please sign in.
    </div>

    <!-- LOGIN FORM — BACKEND SAFE: th:action="@{/login}" method="post" preserved -->
    <form th:action="@{/login}" method="post">

      <!-- Email -->
      <label class="rh-label" for="usernameField">Email Address</label>
      <div class="rh-input-wrap">
        <i class="bi bi-envelope rh-input-icon"></i>
        <!-- BACKEND SAFE: name="username" preserved -->
        <input id="usernameField"
               type="email"
               name="username"
               class="rh-input"
               placeholder="you@example.com"
               required>
      </div>

      <!-- Password -->
      <label class="rh-label" for="passwordField">Password</label>
      <div class="rh-input-wrap">
        <i class="bi bi-lock rh-input-icon"></i>
        <!-- BACKEND SAFE: name="password" preserved -->
        <input id="passwordField"
               type="password"
               name="password"
               class="rh-input rh-input-password"
               placeholder="Enter your password"
               required>
        <button type="button" class="rh-toggle-btn" onclick="togglePassword()">
          <i class="bi bi-eye" id="toggleIcon"></i>
        </button>
      </div>

      <!-- Forgot password — BACKEND SAFE: th:href="@{/forgot-password}" preserved -->
      <a class="rh-forgot" th:href="@{/forgot-password}">Forgot password?</a>

      <!-- Submit -->
      <button type="submit" class="rh-submit">Sign In</button>

    </form>

    <div class="rh-divider">or</div>

    <!-- Register — BACKEND SAFE: th:href="@{/register}" preserved -->
    <div class="rh-register-row">
      Don't have an account? <a th:href="@{/register}">Create one free</a>
    </div>

  </div>

<script>
  function togglePassword() {
    var input = document.getElementById('passwordField');
    var icon  = document.getElementById('toggleIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
  }
</script>

</body>
</html>
