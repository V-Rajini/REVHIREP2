<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <meta http-equiv="refresh" content="10;url=/">
  <title>Logged Out | RevHire</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--accent:#2557a7;--accent-light:#eff6ff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--font:"Inter","Segoe UI",system-ui,sans-serif}
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:var(--font);font-size:14px;color:var(--text);background:#f3f4f6;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .rh-card{background:#fff;border:1px solid var(--border);border-radius:20px;box-shadow:0 8px 40px rgba(0,0,0,.09);max-width:420px;width:100%;padding:48px 40px 44px;text-align:center}
    .rh-brand{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px}
    .rh-brand-icon{width:38px;height:38px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
    .rh-brand-name{font-size:19px;font-weight:800;color:var(--text)}
    .rh-success-icon{width:72px;height:72px;background:#f0fdf4;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;color:#059669;margin:0 auto 22px;border:2px solid #bbf7d0}
    .rh-title{font-size:22px;font-weight:700;margin:0 0 10px;color:var(--text)}
    .rh-sub{font-size:14px;color:var(--muted);margin:0 0 28px;line-height:1.6}
    .rh-countdown{font-size:13px;color:var(--muted);margin:0 0 30px;background:#f9fafb;border:1px solid var(--border);border-radius:8px;padding:10px 16px;display:inline-flex;align-items:center;gap:7px}
    .rh-countdown strong{color:var(--accent);font-weight:700}
    .rh-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:10px;background:var(--accent);color:#fff;border:none;font-size:14px;font-weight:700;font-family:var(--font);text-decoration:none;transition:background .15s;cursor:pointer}.rh-btn:hover{background:#1a4480;color:#fff;text-decoration:none}
    .rh-divider{height:1px;background:var(--border);margin:24px 0}
  </style>
</head>
<body>
  <div class="rh-card">
    <div class="rh-brand">
      <div class="rh-brand-icon">R</div>
      <span class="rh-brand-name">RevHire</span>
    </div>
    <div class="rh-success-icon"><i class="bi bi-check-lg"></i></div>
    <h1 class="rh-title">You've been logged out</h1>
    <p class="rh-sub">Your session has ended securely. Thank you for using RevHire.</p>
    <p class="rh-countdown"><i class="bi bi-clock"></i> Redirecting to home in <strong id="timer">10</strong> seconds…</p>
    <div class="rh-divider"></div>
    <a href="/" class="rh-btn"><i class="bi bi-house-fill"></i> Go to Home</a>
  </div>
  <script>
    var s=10;var t=setInterval(function(){s--;document.getElementById('timer').textContent=s;if(s<=0){clearInterval(t);}},1000);
  </script>
</body></html>
