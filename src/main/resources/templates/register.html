<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<!-- ============================================================
     RevHire | register.html  — Clean Redesign
     ============================================================
     ✅ ALL Thymeleaf attributes preserved EXACTLY:
       • th:href="@{/}"
       • th:action="@{/register}" method="post"
       • th:object="${registerDto}"
       • th:field="*{email}"
       • th:field="*{password}"
       • th:field="*{role}"
       • th:field="*{securityQuestion}"
       • th:field="*{securityAnswer}"
       • th:if="${errorMessage}" / th:text="${errorMessage}"
       • th:if="${#fields.hasErrors(...)}" / th:errors="*{...}"
       • th:href="@{/login}"
     ============================================================ -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register | RevHire</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: #f3f4f6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
      margin: 0;
    }

    /* ── Brand ── */
    .rh-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      margin-bottom: 24px;
    }

    .rh-brand-icon {
      width: 36px; height: 36px;
      background: #2557a7;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; color: #fff;
      box-shadow: 0 3px 10px rgba(37,87,167,0.30);
    }

    .rh-brand-name {
      font-size: 20px; font-weight: 700;
      color: #111827; letter-spacing: -0.3px;
    }

    /* ── Card ── */
    .rh-card {
      background: #fff;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      padding: 36px 36px 32px;
      width: 100%;
      max-width: 480px;
    }

    .rh-card-title {
      font-size: 22px; font-weight: 700;
      color: #111827; margin: 0 0 4px;
      letter-spacing: -0.3px;
    }

    .rh-card-sub {
      font-size: 14px; color: #6b7280;
      margin: 0 0 28px;
    }

    /* ── Role selector tabs ── */
    .rh-role-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }

    .rh-role-tab {
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px 10px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      background: #fff;
    }

    .rh-role-tab:hover {
      border-color: #bfdbfe;
      background: #f9fafb;
    }

    .rh-role-tab.selected {
      border-color: #2557a7;
      background: #eff6ff;
    }

    .rh-role-tab i {
      font-size: 22px;
      color: #9ca3af;
      display: block;
      margin-bottom: 6px;
      transition: color 0.15s;
    }

    .rh-role-tab.selected i { color: #2557a7; }

    .rh-role-tab span {
      font-size: 13px; font-weight: 600;
      color: #6b7280;
    }

    .rh-role-tab.selected span { color: #2557a7; }

    /* ── Label ── */
    .rh-label {
      font-size: 13px; font-weight: 600;
      color: #374151; margin-bottom: 7px;
      display: block;
    }

    /* ── Input wrap ── */
    .rh-input-wrap {
      position: relative;
      margin-bottom: 6px;
    }

    .rh-input-icon {
      position: absolute;
      top: 50%; left: 14px;
      transform: translateY(-50%);
      color: #9ca3af; font-size: 15px;
      pointer-events: none;
    }

    .rh-input, .rh-select {
      width: 100%;
      height: 44px;
      padding: 0 14px 0 40px;
      border: 1px solid #e5e7eb;
      border-radius: 9px;
      font-size: 14px; font-family: inherit;
      color: #111827; background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
      appearance: none;
    }

    .rh-input:focus, .rh-select:focus {
      border-color: #2557a7;
      box-shadow: 0 0 0 3px rgba(37,87,167,0.10);
    }

    .rh-input::placeholder { color: #9ca3af; }
    .rh-input-password     { padding-right: 44px; }

    .rh-toggle-btn {
      position: absolute;
      top: 50%; right: 12px;
      transform: translateY(-50%);
      background: none; border: none;
      color: #9ca3af; font-size: 16px;
      cursor: pointer; padding: 2px 4px;
      transition: color 0.15s;
    }

    .rh-toggle-btn:hover { color: #374151; }

    /* select chevron */
    .rh-select-wrap {
      position: relative;
      margin-bottom: 6px;
    }

    .rh-select-wrap::after {
      content: '\f282';
      font-family: 'bootstrap-icons';
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      color: #9ca3af; font-size: 14px;
      pointer-events: none;
    }

    .rh-field-group { margin-bottom: 18px; }

    /* ── Field error ── */
    .rh-field-error {
      font-size: 12px; color: #dc2626;
      margin-top: 5px; display: block;
    }

    /* ── Hint text ── */
    .rh-hint {
      font-size: 12px; color: #9ca3af;
      margin-top: 5px; display: block;
    }

    /* ── Divider ── */
    .rh-divider {
      height: 1px; background: #f3f4f6;
      margin: 22px 0;
    }

    /* ── Submit ── */
    .rh-submit {
      width: 100%; height: 46px;
      background: #2557a7;
      color: #fff;
      border: none; border-radius: 9px;
      font-size: 15px; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .rh-submit:hover  { background: #1a4480; }
    .rh-submit:active { transform: scale(0.98); }

    /* ── Alert ── */
    .rh-alert-danger {
      border-radius: 9px; padding: 11px 14px;
      font-size: 13.5px; font-weight: 500;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 9px;
      background: #fef2f2; color: #991b1b;
      border: 1px solid #fecaca;
    }

    /* ── Login row ── */
    .rh-login-row {
      text-align: center;
      font-size: 13.5px; color: #6b7280;
      margin-top: 20px;
    }

    .rh-login-row a {
      font-weight: 600; color: #2557a7; text-decoration: none;
    }

    .rh-login-row a:hover { text-decoration: underline; }

    /* ── Back ── */
    .rh-back {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 13px; font-weight: 500;
      color: #6b7280; text-decoration: none;
      margin-bottom: 24px; transition: color 0.15s;
    }

    .rh-back:hover { color: #2557a7; }

    /* ── Section label inside form ── */
    .rh-form-section {
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      color: #9ca3af; margin-bottom: 16px;
    }

    @media (max-width: 520px) {
      .rh-card { padding: 28px 20px; }
    }
  </style>
</head>

<body>

  <!-- Brand — BACKEND SAFE: th:href="@{/}" preserved -->
  <a class="rh-brand" th:href="@{/}">
    <div class="rh-brand-icon">R</div>
    <span class="rh-brand-name">RevHire</span>
  </a>

  <div class="rh-card">

    <!-- Back -->
    <a class="rh-back" th:href="@{/}">
      <i class="bi bi-arrow-left"></i> Back to Home
    </a>

    <!-- Heading -->
    <h1 class="rh-card-title">Create your account</h1>
    <p class="rh-card-sub">Join RevHire — it's free</p>

    <!-- BACKEND SAFE: th:action="@{/register}" th:object="${registerDto}" preserved -->
    <form th:action="@{/register}" th:object="${registerDto}" method="post">

      <!-- Global error — BACKEND SAFE: th:if="${errorMessage}" th:text="${errorMessage}" preserved -->
      <div th:if="${errorMessage}" class="rh-alert-danger">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${errorMessage}"></span>
      </div>

      <!-- ── ROLE SELECTION ──
           Visual tabs drive the hidden select — BACKEND SAFE: th:field="*{role}" preserved -->
      <div class="rh-form-section">I am a...</div>

      <div class="rh-role-tabs" id="roleTabs">
        <div class="rh-role-tab" id="tabSeeker" onclick="selectRole('JOB_SEEKER')">
          <i class="bi bi-person-workspace"></i>
          <span>Job Seeker</span>
        </div>
        <div class="rh-role-tab" id="tabEmployer" onclick="selectRole('EMPLOYER')">
          <i class="bi bi-building"></i>
          <span>Employer</span>
        </div>
      </div>

      <!-- Hidden role select — BACKEND SAFE: th:field="*{role}" preserved -->
      <div class="rh-field-group" style="display:none;">
        <select th:field="*{role}" id="roleSelect" required>
          <option value="">-- Select Role --</option>
          <option value="JOB_SEEKER">Job Seeker</option>
          <option value="EMPLOYER">Employer</option>
        </select>
        <span class="rh-field-error"
              th:if="${#fields.hasErrors('role')}"
              th:errors="*{role}"></span>
      </div>

      <div class="rh-divider"></div>

      <!-- ── ACCOUNT DETAILS ── -->
      <div class="rh-form-section">Account Details</div>

      <!-- Email — BACKEND SAFE: th:field="*{email}" preserved -->
      <div class="rh-field-group">
        <label class="rh-label" for="emailField">Email Address</label>
        <div class="rh-input-wrap">
          <i class="bi bi-envelope rh-input-icon"></i>
          <input id="emailField"
       type="email"
       th:field="*{email}"
       class="rh-input"
       placeholder="you@example.com"
       required
       pattern="^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[A-Za-z]{2,}$"
       title="Please enter a valid email address (example: name@example.com)">
        </div>
        <span class="rh-field-error"
              th:if="${#fields.hasErrors('email')}"
              th:errors="*{email}"></span>
      </div>

      <!-- Password — BACKEND SAFE: th:field="*{password}" preserved -->
      <div class="rh-field-group">
        <label class="rh-label" for="passwordField">Password</label>
        <div class="rh-input-wrap">
          <i class="bi bi-lock rh-input-icon"></i>
          <input id="passwordField"
                 type="password"
                 th:field="*{password}"
                 class="rh-input rh-input-password"
                 placeholder="Min 8 chars, 1 uppercase, 1 number, 1 symbol"
                 required
                 pattern="^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$"
                 title="Minimum 8 characters, one uppercase, one number, one special symbol">
          <button type="button" class="rh-toggle-btn" onclick="togglePassword()">
            <i class="bi bi-eye" id="toggleIcon"></i>
          </button>
        </div>
        <span class="rh-hint">8+ characters, uppercase, number &amp; special symbol</span>
        <span class="rh-field-error"
              th:if="${#fields.hasErrors('password')}"
              th:errors="*{password}"></span>
      </div>

      <div class="rh-divider"></div>

      <!-- ── SECURITY ── -->
      <div class="rh-form-section">Security &amp; Recovery</div>

      <!-- Security Question — BACKEND SAFE: th:field="*{securityQuestion}" preserved -->
      <div class="rh-field-group">
        <label class="rh-label">Security Question</label>
        <div class="rh-select-wrap">
          <i class="bi bi-shield-lock rh-input-icon" style="pointer-events:none;"></i>
          <select th:field="*{securityQuestion}" class="rh-select" required>
            <option value="">-- Select a question --</option>
            <option value="What is your first pet name?">What is your first pet name?</option>
            <option value="What is your primary school name?">What is your primary school name?</option>
            <option value="In which city were you born?">In which city were you born?</option>
            <option value="Childhood best friend name?">Childhood best friend name?</option>
            <option value="What is your favorite color?">What is your favorite color?</option>
          </select>
        </div>
        <span class="rh-field-error"
              th:if="${#fields.hasErrors('securityQuestion')}"
              th:errors="*{securityQuestion}"></span>
      </div>

      <!-- Security Answer — BACKEND SAFE: th:field="*{securityAnswer}" preserved -->
      <div class="rh-field-group">
        <label class="rh-label" for="answerField">Your Answer</label>
        <div class="rh-input-wrap">
          <i class="bi bi-key rh-input-icon"></i>
          <input id="answerField"
                 type="text"
                 th:field="*{securityAnswer}"
                 class="rh-input"
                 placeholder="Enter your answer"
                 required>
        </div>
        <span class="rh-field-error"
              th:if="${#fields.hasErrors('securityAnswer')}"
              th:errors="*{securityAnswer}"></span>
      </div>

      <!-- Submit -->
      <button type="submit" class="rh-submit">Create Account</button>

    </form>

    <!-- Login link — BACKEND SAFE: th:href="@{/login}" preserved -->
    <div class="rh-login-row">
      Already have an account? <a th:href="@{/login}">Sign in</a>
    </div>

  </div>

<script>
  /* Role tab highlight + sync with hidden select */
  function selectRole(val) {
    document.getElementById('roleSelect').value = val;
    document.getElementById('tabSeeker').classList.toggle('selected',  val === 'JOB_SEEKER');
    document.getElementById('tabEmployer').classList.toggle('selected', val === 'EMPLOYER');
  }

  /* Pre-select tab if Thymeleaf repopulates the field on validation error */
  (function() {
    var v = document.getElementById('roleSelect').value;
    if (v) selectRole(v);
  })();

  /* Password toggle */
  function togglePassword() {
    var input = document.getElementById('passwordField');
    var icon  = document.getElementById('toggleIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
  }
</script>

</body>
</html>
